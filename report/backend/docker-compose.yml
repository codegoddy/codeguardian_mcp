services:
  nats:
    image: docker.io/nats:2.10
    ports:
      - "4222:4222"
      - "8222:8222"
      - "9222:9222"
    volumes:
      - nats-data:/data
      - ../nats-server.conf:/etc/nats-server.conf
    command:
      - "-c"
      - "/etc/nats-server.conf"
    networks:
      - app-network

  backend:
    build: .
    # network_mode: host  <-- Removed to allow scaling and standard networking
    env_file:
      - .env
    environment:
      - NATS_URL=nats://nats:4222 # Use service name 'nats' instead of localhost
    depends_on:
      - nats
    volumes:
      - ./:/app
    networks:
      - app-network
    deploy:
      mode: replicated
      replicas: 3 # Start 3 instances of the backend

  nginx:
    image: nginx:latest
    ports:
      - "8080:80" # Expose Nginx on port 8080
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  nats-data:

networks:
  app-network:
    driver: bridge
