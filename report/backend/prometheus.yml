# Prometheus Configuration for DevHQ

global:
  scrape_interval: 15s  # Scrape metrics every 15 seconds
  evaluation_interval: 15s  # Evaluate rules every 15 seconds
  external_labels:
    cluster: 'devhq-dev'
    environment: 'development'

# Alertmanager configuration (optional - for alerting)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# Load rules once and periodically evaluate them
# rule_files:
#   - "alerts.yml"

# Scrape configurations
scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'

  # Scrape DevHQ Backend (all 3 replicas)
  - job_name: 'devhq-backend'
    scrape_interval: 10s  # More frequent scraping for app metrics
    metrics_path: '/metrics'  # Path to metrics endpoint
    static_configs:
      - targets:
          - 'backend:8000'  # Docker service name will resolve to all replicas
        labels:
          service: 'devhq-backend'
          environment: 'development'
    
    # Relabeling to add instance information
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [__address__]
        regex: '([^:]+):.*'
        target_label: host
        replacement: '${1}'

  # Scrape NATS (if NATS exposes metrics)
  # - job_name: 'nats'
  #   static_configs:
  #     - targets: ['nats:8222']  # NATS monitoring port
  #       labels:
  #         service: 'nats'

  # Scrape PostgreSQL (if postgres_exporter is added)
  # - job_name: 'postgres'
